# ============================================
# Skills 下载器配置（从哪 git clone + 怎么 build）
# ============================================
# 顺序即优先级，靠前的优先级更高（同名 skill 保留高优先级版本）
#
# repos:    整仓库 clone（一个 repo 含多个 skill）
# extracts: 单 skill 提取（从大 repo 抠一个子目录）
#
# 字段说明：
#   repo            (必填)  GitHub owner/repo
#   prefix          (推荐)  skill 名前缀，避免撞名；显式空字符串 "" 表示不加前缀
#   name            (可选)  source 名；不写则从 prefix 或 repo 推断；
#                           runtime_assets 等需要按名引用时必填
#   clone_to        (可选)  克隆目标；不写则 = ~/.skills-community/{prefix or name}
#                           本地工作区类的源（如 owned）必须显式声明
#   skills_dir      (可选)  skill 根目录；不写则自动扫描 SKILL.md 推断
#   branch          (可选)  默认 main
#   build           (可选)  克隆后执行的命令
#   include         (可选)  只检出并聚合这些 skill；使用 Git sparse checkout
#   exclude         (可选)  跳过的 skill 名列表
#   runtime_assets  (可选)  symlink 到主 skill 目录的资产（仅整仓 source）

repos:
  - repo: unix2dos/skills
    name: unix2dos
    prefix: ""
    clone_to: ~/workspace/skills
    exclude: [confidence-check]

  - repo: lijigang/ljg-skills
    prefix: ""
    skills_dir: skills
    branch: master
    include: [ljg-plain, ljg-think, ljg-writes, ljg-roundtable]

  # mattpocock/skills 带 grillme 的 skill
  - repo: mattpocock/skills
    name: mattpocock-engineering
    clone_to: ~/.skills-community/mattpocock-skills
    skills_dir: skills/engineering

  - repo: mattpocock/skills
    name: mattpocock-productivity
    clone_to: ~/.skills-community/mattpocock-skills
    skills_dir: skills/productivity

  - repo: mattpocock/skills
    name: mattpocock-in-progress
    clone_to: ~/.skills-community/mattpocock-skills
    skills_dir: skills/in-progress


  ### 注释掉的 skill ###

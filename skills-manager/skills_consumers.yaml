# ============================================
# Skills 消费者配置（谁装什么 skill）
# ============================================
# 规则（一句话）：
#   默认装 core；写 add 加几个；写 only 完全自定义不要 core。
#
# 三种写法：
#   {}                         → 装 core
#   { add: [a, b] }            → core ∪ {a, b}
#   { only: [a, b] }           → {a, b}（不要 core）
#
# add / only 互斥；都没写等价于 {}。
# 出现在 consumers: 里 = 被 install.sh 管理；不写 = 完全不碰。
# consumer 中的真实目录视为外部内容，安装器只同步 symlink。
#
# 引用形式（在 core / add / only 里都通用）：
#   - <skill-name>             具体 skill 名，例如 code-refactor
#   - source:<name>            展开为该 source 的所有 skill；<name> 取自
#                              skills_sources.yaml 里的 name / prefix / repo basename
#                              （即 derive_source_name 的结果）
#                              例：source:unix2dos / source:mattpocock-engineering / source:extract

# ─── 核心 skill 集 ────────────────────────────────────────────
# 跨工具默认安装。分组与 README.md 一致；用途说明见 README，安装见 INSTALL.md
core:
  # ① unix2dos/skills 整源
  - source:unix2dos

  # ② 社区精选
  - architecture-designer # 系统架构、ADR、技术选型
  - humanizer-zh # 去 AI 味
  - ljg-plain # 白话解释
  - ljg-think # 纵向深钻
  - ljg-writes # 深度长文
  - ljg-roundtable # 圆桌辩论
  - find-skills # 发现社区 skill
  - design-taste-frontend # anti-slop 前端（landing / portfolio / 新建页）
  - redesign-existing-projects # 改造已有项目 UI，audit-first

  # ⑦ Matt Pocock（mattpocock/skills）
  - source:mattpocock-engineering # grill-with-docs, diagnosing-bugs, tdd, triage, to-issues, to-prd, implement, …
  - source:mattpocock-productivity # grill-me, handoff, grilling, teach, writing-great-skills

# ─── 各 AI 工具的 skill 集 ────────────────────────────────────
consumers:
  # Claude Code：默认核心集
  "~/.claude/skills": {}

  # Codex（OpenAI CLI）：默认核心集
  "~/.codex/skills": {}

  # Cursor IDE：默认核心集
  "~/.cursor/skills": {}

  # 通用 agents 入口：默认核心集
  "~/.agents/skills": {}

  # AGY CLI（命令行）：默认核心集
  "~/.gemini/antigravity-cli/skills": {}

  # Antigravity 2.0 桌面 APP：默认核心集
  "~/.gemini/config/skills": {}

  # OpenClaw：默认核心集
  "~/.openclaw/skills": {}

  # OpenCode：默认核心集
  "~/.config/opencode/skills": {}

  # Alma：默认核心集
  "~/.config/alma/skills": {}

  # Factory（Droid）：默认核心集
  "~/.factory/skills": {}

  # WorkBuddy：默认核心集（让 WorkBuddy Skill 工具能发现这些 skill）
  "~/.workbuddy/skills": {}

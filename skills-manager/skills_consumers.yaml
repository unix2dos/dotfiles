# ============================================
# Skills 消费者配置（谁装什么 skill）
# ============================================
# 规则（一句话）：
#   默认装 core；写 add 加几个；写 only 完全自定义不要 core。
#
# 三种写法：
#   {}                         → 装 core
#   { add: [a, b] }            → core ∪ {a, b}
#   { only: [a, b] }           → {a, b}（不要 core）
#
# add / only 互斥；都没写等价于 {}。
# 出现在 consumers: 里 = 被 install.sh 管理；不写 = 完全不碰。
#
# 引用形式（在 core / add / only 里都通用）：
#   - <skill-name>             具体 skill 名，例如 code-refactor
#   - source:<name>            展开为该 source 的所有 skill；<name> 取自
#                              skills_sources.yaml 里的 name / prefix / repo basename
#                              （即 derive_source_name 的结果）
#                              例：source:superpowers / source:skills / source:extract

# ─── 核心 skill 集 ────────────────────────────────────────────
# 跨工具默认安装。分组与 README.md 一致；用途说明见 README，安装见 INSTALL.md
core:
  # ① 澄清与方案对齐
  - ask-first # 模糊输入 → 真实意图
  - asking-clarifying-questions # 需求对齐、消歧术语
  - confidence-check # 写代码前置信度检查

  # ② 架构与设计
  - architecture-designer # 系统架构、ADR、技术选型
  - mermaid-generator # Mermaid 图表
  - ui-ux-auditor # UI/UX 审计（手动 @）
  - strategic-product-advisor # 产品方向、竞品（手动 @）

  # ③ 编码
  - karpathy-guidelines # LLM 编码守则
  - code-refactor # Go 重构
  - code-simplifier # 代码简化

  # ④ 内容与写作
  - blog-knowledge-extraction # 素材 → 博客（手动 @）
  - technical-content-optimizer # 博客润色（手动 @）
  - humanizer-zh # 去 AI 味
  - ljg-plain # 白话解释
  - ljg-think # 纵向深钻
  - ljg-writes # 深度长文
  - ljg-roundtable # 圆桌辩论

  # ⑤ 学习与探索
  - learn-map # 系统化学习（手动 @）

  # ⑥ Skill 生态
  - skill-creator # 创建/修改 skill
  - find-skills # 发现社区 skill
  - autoresearch # 自动 eval 优化 skill

  # ⑦ Matt Pocock（mattpocock/skills）
  - source:mattpocock-engineering # grill-with-docs, diagnose, tdd, triage, to-issues, to-prd, …
  - source:mattpocock-productivity # caveman, grill-me, handoff, write-a-skill

# ─── 各 AI 工具的 skill 集 ────────────────────────────────────
consumers:
  # Claude Code：默认核心集
  "~/.claude/skills": {}

  # Codex（OpenAI CLI）：核心集 + superpowers 全家桶
  "~/.codex/skills":
    add:
      - source:superpowers

  # Cursor IDE：默认核心集
  "~/.cursor/skills": {}

  # 通用 agents 入口：默认核心集
  "~/.agents/skills": {}

  # Gemini Antigravity：默认核心集
  "~/.gemini/antigravity/skills": {}
  "~/.gemini/config/skills": {}

  # OpenClaw：核心集 + unix2dos/skills 整源
  "~/.openclaw/skills":
    add:
      - source:skills

  # OpenCode：默认核心集
  "~/.config/opencode/skills": {}

  # Alma：默认核心集
  "~/.config/alma/skills": {}

  # Factory（Droid）：默认核心集
  "~/.factory/skills": {}

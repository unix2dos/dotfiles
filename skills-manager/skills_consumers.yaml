# ============================================
# Skills 消费者配置（谁装什么 skill）
# ============================================
# 规则（一句话）：
#   默认装 core；写 add 加几个；写 only 完全自定义不要 core。
#
# 三种写法：
#   {}                         → 装 core
#   { add: [a, b] }            → core ∪ {a, b}
#   { only: [a, b] }           → {a, b}（不要 core）
#
# add / only 互斥；都没写等价于 {}。
# 出现在 consumers: 里 = 被 install.sh 管理；不写 = 完全不碰。
#
# 引用形式（在 core / add / only 里都通用）：
#   - <skill-name>             具体 skill 名，例如 code-refactor
#   - source:<name>            展开为该 source 的所有 skill；<name> 取自
#                              skills_sources.yaml 里的 name / prefix / repo basename
#                              （即 derive_source_name 的结果）
#                              例：source:superpowers / source:skills / source:extract

# ─── 核心 skill 集 ────────────────────────────────────────────
# 跨工具最常用的几个，所有 consumer 默认都装这套
core:
  - ask-first # 先问后答专家
  - confidence-check # 前置信度检查
  - asking-clarifying-questions # 提问澄清专家

  - code-refactor  # 代码重构专家
  - code-simplifier # 代码简化专家
  - architecture-designer # 架构设计师

  - learn-tech # 学习新技术专家
  - technical-content-optimizer # 技术内容优化专家
  - mermaid-generator # 流程图生成专家

  - strategic-product-advisor # 战略产品规划专家
  - ui-ux-auditor # UI/UX 设计专家
  - autoresearch # 优化 SKILLS 专家
  - humanizer-zh # 中文书写专家
  - ljg-roundtable # 圆桌讨论

# ─── 各 AI 工具的 skill 集 ────────────────────────────────────
consumers:
  # Claude Code：默认核心集
  "~/.claude/skills": {}

  # Codex（OpenAI CLI）：核心集 + superpowers 全家桶
  "~/.codex/skills":
    add:
      - source:superpowers

  # Cursor IDE：默认核心集
  "~/.cursor/skills": {}

  # 通用 agents 入口：默认核心集
  "~/.agents/skills": {}

  # Gemini Antigravity：默认核心集
  "~/.gemini/antigravity/skills": {}

  # OpenClaw：核心集 + unix2dos/skills 整源
  "~/.openclaw/skills":
    add:
      - source:skills

  # OpenCode：默认核心集
  "~/.config/opencode/skills": {}

  # Alma：默认核心集
  "~/.config/alma/skills": {}

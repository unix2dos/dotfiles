# ~/.config/starship.toml

# ============================================
# ⚙️ 全局设置
# ============================================
add_newline = true      # 命令之间增加空行，让双行提示符不拥挤
command_timeout = 500   # 模块超时时间，超时直接跳过
scan_timeout = 30       # 扫描文件系统的超时时间（默认值）

# ============================================
# 👉 左侧配置 (第一行内容 + 换行 + 第二行光标)
# ============================================
format = """
$directory\
$git_branch\
$custom\
$git_state\
$git_status\
$line_break\
$character"""
# 注意上面加入了 $line_break (换行符)
# $character (光标) 现在位于最后，也就是第二行

# ============================================
# 👉 右侧配置 (浮动在第一行的最右侧)
# ============================================
right_format = """
$cmd_duration\
$golang\
$nodejs\
$python\
$rust\
$docker_context\
$jobs\
$battery\
$time"""

# ============================================
# 🎨 样式细节微调 (保持无背景默认色)
# ============================================

# [换行符] - 可以在这里决定是否显示上一行的空隙，默认即可
[line_break]
disabled = false

# [输入光标] - 现在它位于第二行开头
[character]
#success_symbol = "[❯](bold green) "
#error_symbol = "[❯](bold red) "
success_symbol = "[╰](white)[❯](cyan)[❯](blue)[❯](green) "
error_symbol = "[╰](white)[❯](red)[❯](red)[❯](red) "

# [目录]
[directory]
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
style = "cyan bold"
read_only = " 🔒"

# [Git 分支]
[git_branch]
symbol = " "
style = "green bold"

# [Git 状态]
[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"
ignore_submodules = true
conflicted = "\uf071 "
ahead = "\uf062 ${count}"
behind = "\uf063 ${count}"
diverged = "\uf0ec \uf062 ${ahead_count}\uf063 ${behind_count}"
untracked = "\uf016 ${count} " 
stashed = "\uf187 ${count} "  
modified = "\uf044 ${count} "
staged = "\uf067 ${count} "   
renamed = "\uf061 ${count} "  
deleted = "\uf014 ${count} " 

# [Nodejs]
[nodejs]
symbol = "\ue719 "        #   (六边形 Logo，比原本的  更厚实)
style = "bold green"
format = "[$symbol]($style)"

# [Golang]
[golang]
symbol = "\ue626 "        #   (GO 字母图标，比原本的  地鼠更清晰)
style = "bold cyan"
format = "[$symbol]($style)"

# [Python]
[python]
symbol = "\ue73c "        #   (标准的 Python Logo，比原本的  更有辨识度)
style = "bold yellow"
format = "[$symbol]($style)"

# [Rust]
[rust]
format = "[$symbol]($style)"

# [Docker]
[docker_context]
symbol = " "
format = "[$symbol$context](blue bold) "
only_with_files = true

# [命令执行耗时]
[cmd_duration]
min_time = 500
format = "[$duration](bold yellow) "

# [AWS]
[aws]
disabled = true

# [Git Worktree] - worktree 显示
[custom.worktree]
command = """
wt_path=$(git rev-parse --git-dir 2>/dev/null)
if [[ "$wt_path" == *".git/worktrees/"* ]]; then
  echo "🌲 $(basename "$wt_path")"
else
  echo "🤡"
fi
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = " [($output)](bold magenta)  "
shell = ["bash", "--noprofile", "--norc"]

# [当前时间]
[time]
disabled = false
style = "bold white"
format = "[$time]($style) "
use_12hr = false

